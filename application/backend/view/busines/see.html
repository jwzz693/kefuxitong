
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/component/pear/css/pear.css" />
</head>
<body>
    <form class="layui-form" action="">
        <div class="mainBox">
            <input type="hidden" name="id" value="{$business.id}"/>
            <div class="main-container">
                
                <div class="layui-form-item">
                    <label class="layui-form-label">姓名</label>
                    <div class="layui-input-block">
                       <input type="text" name="max_count" value="{$business.bussname}" lay-verify="required"  placeholder="请输入姓名" class="layui-input" autocomplete="off">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">年龄</label>
                    <div class="layui-input-block">
                        <input type="text" name="max_count" value="{$business.bussage}" lay-verify="required"  placeholder="请输入年龄" class="layui-input" autocomplete="off">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">邮箱</label>
                    <div class="layui-input-block">
                     <input type="text" name="max_count" value="{$business.bussmaill}" lay-verify="required"  placeholder="请输入邮箱" class="layui-input" autocomplete="off">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">手机号</label>
                    <div class="layui-input-block">
                    <input type="text" name="max_count" value="{$business.bussphone}" lay-verify="required"  placeholder="请输入手机号量" class="layui-input" autocomplete="off">
                    </div>
                </div>
                   <div class="layui-form-item">
                    <label class="layui-form-label">支付宝/微信</label>
                    <div class="layui-input-block">
                    <input type="text" name="max_count" value="{$business.busszfb}" lay-verify="required"  placeholder="请输入手机号量" class="layui-input" autocomplete="off">
                    </div>
                </div>
                    <div class="layui-form-item">
                    <label class="layui-form-label">支付宝/微信</label>
                    <div class="layui-input-block">
                  <img src="{$business.busszfbimg}" style="width: 250px;display: inline-block;margin-right: 10px" />
                    </div>
                </div>
                    <div class="layui-form-item">
                    <label class="layui-form-label">身份证正面</label>
                    <div class="layui-input-block">
                  <img src="{$business.certificationleft}" style="width: 250px;display: inline-block;margin-right: 10px" />
                    </div>
                </div>
                
                
                    <div class="layui-form-item">
                    <label class="layui-form-label">身份证反面</label>
                    <div class="layui-input-block">
                  <img src="{$business.certificationright}" style="width: 250px;display: inline-block;margin-right: 10px" />
                    </div>
                </div>
                  <div class="layui-form-item">
                    <label class="layui-form-label">营业执照</label>
                    <div class="layui-input-block">
                  <img src="{$business.businesslicence}" style="width: 250px;display: inline-block;margin-right: 10px" />
                    </div>
                </div>
            </div>
        </div>
        <div class="bottom">
       <div class="button-container">
            <button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit="" lay-filter="save">
                <i class="layui-icon layui-icon-ok"></i>
                审核通过
            </button>
            <button type="reset" class="layui-btn layui-btn-primary layui-btn-sm" lay-submit="" lay-filter="err">
                <i class="layui-icon layui-icon-refresh"></i>
                审核不通过
            </button>
        </div>
    </div>
</form>
<script src="/static/component/layui/layui.js"></script>
<script src="/static/component/pear/pear.js"></script>
<script>
layui.use(['form','jquery','laydate'],function(){
    let form = layui.form;
    let $ = layui.jquery;
    let laydate = layui.laydate;

    laydate.render({
        elem: "#valid_time",
        type: 'datetime'
    });

    form.on('submit(save)', function(data){
        $.ajax({
            url: "/backend/busines/shenhe",
            data:JSON.stringify(data.field),
            dataType:'json',
            contentType:'application/json',
            type:'post',
            success:function(res){
                if (res.code==1) {
                    layer.msg(res.msg, {
                        icon: 1
                    });
                    setTimeout(function() {
                        var index = parent.layer.getFrameIndex(window.name); //获取窗口索引
                        parent.layer.close(index);
                        parent.layui.table.reload("dataTable");
                    }, 2000)
                }else {
                    layer.msg(res.msg,{icon:2,time:1500})
                }
            }
        });
        return false;
    });
        form.on('submit(err)', function(data){
        $.ajax({
            url: "/backend/busines/bushenhe",
            data:JSON.stringify(data.field),
            dataType:'json',
            contentType:'application/json',
            type:'post',
            success:function(res){
                if (res.code==1) {
                    layer.msg(res.msg, {
                        icon: 1
                    });
                    setTimeout(function() {
                        var index = parent.layer.getFrameIndex(window.name); //获取窗口索引
                        parent.layer.close(index);
                        parent.layui.table.reload("dataTable");
                    }, 2000)
                }else {
                    layer.msg(res.msg,{icon:2,time:1500})
                }
            }
        });
        return false;
    });
})
</script>
</body>
</html>
