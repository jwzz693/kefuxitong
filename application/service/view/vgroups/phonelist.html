
<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
    <link rel="stylesheet" href="/static/component/pear/css/pear.css" />
</head>
<body class="pear-container">
		<div class="layui-card">
			<div class="layui-card-body">
				<form class="layui-form" action="">
					<div class="layui-form-item">
						<div class="layui-form-item layui-inline">
							<label class="layui-form-label">联系人名称</label>
							<div class="layui-input-inline">
								<input type="text" name="truename" placeholder="请输入联系人名称" class="layui-input">
							</div>
						</div>
						<div class="layui-form-item layui-inline">
							<label class="layui-form-label">联系方式</label>
							<div class="layui-input-inline">
								<input type="text" name="contact" placeholder="请输入联系人联系方式" class="layui-input">
							</div>
						</div>
						<div class="layui-form-item layui-inline">
							<button class="pear-btn pear-btn-md pear-btn-primary" lay-submit lay-filter="query">
								<i class="layui-icon layui-icon-search"></i>
								查询
							</button>
							<button type="reset" class="pear-btn pear-btn-md">
								<i class="layui-icon layui-icon-refresh"></i>
								重置
							</button>
					<input type="button" class="pear-btn pear-btn-md" value="清空" onclick="one_delete()" />
						</div>
					</div>
				</form>
			</div>
		</div>
		<div class="layui-card">
			<div class="layui-card-body">
				<table id="dataTable" lay-filter="dataTable"></table>
			</div>
		</div>

		<script type="text/html" id="username">
		《》
		</script>

		<script type="text/html" id="tool-bar">
			<button class="pear-btn pear-btn-danger pear-btn-xs" lay-event="remove"><i class="layui-icon layui-icon-delete"></i>删除</button>
		
		</script>

        <script src="/static/component/layui/layui.js"></script>
        <script src="/static/component/pear/pear.js"></script>
        <script src="http://libs.baidu.com/jquery/2.0.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/clipboard@2.0.6/dist/clipboard.min.js"></script>
        <script>

			layui.use(['table', 'form', 'jquery','common'], function() {
				let table = layui.table;
				let form = layui.form;
				let $ = layui.jquery;
				let common = layui.common;

				let MODULE_PATH = "/service/";

                let cols = [
                        [{
                                field: 'id',
                                title: 'ID',
                                unresize: true,
                                align: 'left',
                                width: 80
                            }, {
                                field: 'truename',
                                title: '手机号',
                                unresize: true,
                                align: 'left',
                               templet:function(d){
                    
     return '<a href="javascript:;" data-clipboard-text="111" class="font-primary" title="点击复制" lay-event="copyCoverUrl">'+d.truename+'&nbsp;&nbsp;(复制)</a>';
                               },
                               unresize: true, 
                               align: 'center',
                            },{
                                field: 'contact',
                                title: 'IP',
                                unresize: true,
                                align: 'left',
                            },{
                                field: 'content',
                                title: '设备',
                                unresize: true,
                                align: 'left',
                            }, {
								field: 'create_time',
								title: '添加时间',
								unresize: true,
								align: 'left',
							},
                            {
                                title: '操作',
                                toolbar: '#tool-bar',
                                align: 'center',
                                width: 200
                            }
                        ]
                    ];

				table.render({
					elem: '#dataTable',
					url: MODULE_PATH + 'vgroups/phonelist',
					page: true,
					cols: cols,
                    cellMinWidth: 100,
					skin: 'line',
					toolbar: '#toolbar',
					defaultToolbar: [{
						title: '刷新',
						layEvent: 'refresh',
						icon: 'layui-icon-refresh',
					}, 'filter', 'print', 'exports']
				});

				table.on('toolbar(dataTable)', function(obj) {
					if (obj.event === 'refresh') {
						window.refresh();
					} else if (obj.event === 'add') {
                        window.add(obj);
                    }
				});
/* 表格工具条点击事件 */


                table.on('tool(dataTable)', function(obj) {
					if (obj.event === 'edit') {
                        window.edit(obj);
                    }else if (obj.event === 'remove') {
                        window.remove(obj);
                    }else if (obj.event === 'copyCoverUrl') {
                        window.copy(obj);
                    }
                });

                form.on('submit(query)', function(data) {
                    table.reload('dataTable', {
                        where: data.field,
                        page:{curr: 1}
                    });
                    return false;
                });
                  window.copy = function(obj) {
            let transfer = document.createElement('input');
    document.body.appendChild(transfer);
    transfer.value = obj.data.truename; 
    transfer.focus();
    transfer.select();
    if (document.execCommand('copy')) {
        document.execCommand('copy');
    }
    transfer.blur();
    console.log('复制成功');
    document.body.removeChild(transfer);
              //  copy(obj.data.truename) 


                };


                window.remove = function(obj) {
                    layer.confirm('确定要删除该留言吗？', {
                        icon: 3,
                        title: '提示'
                    }, function(index) {
                        layer.close(index);
                        let loading = layer.load();
                        $.ajax({
                            url: MODULE_PATH + "vgroups/removemsg_phone?id="+obj.data.id,
                            dataType: 'json',
                            type: 'delete',
                            success: function(result) {
                                layer.close(loading);
                                if (result.code === 1) {
                                    layer.msg(result.msg, {
                                        icon: 1,
                                        time: 1000
                                    }, function() {
                                        obj.del();
                                    });
                                } else {
                                    layer.msg(result.msg, {
                                        icon: 2,
                                        time: 1000
                                    });
                                }
                            }
                        })
                    });
                };

				window.refresh = function(param) {
					table.reload('dataTable');
				}

			})
							function  one_delete(){
			                 $.ajax({
                            url:  "/service/vgroups/removephoneall",
                            dataType: 'json',
                            type: 'delete',
                            success: function(result) {

                                if (result.code === 1) {
                                    layer.msg(result.msg, {
                                        icon: 1,
                                        time: 1000
                                    }, function() {
                                        obj.del();
                                    });
                                } else {
                                    layer.msg(result.msg, {
                                        icon: 2,
                                        time: 1000
                                    });
                                }
                            }
                        })
			}
			
function copy(val) {
    let transfer = document.createElement('input');
    document.body.appendChild(transfer);
    transfer.value = val; 
    transfer.focus();
    transfer.select();
    if (document.execCommand('copy')) {
        document.execCommand('copy');
    }
    transfer.blur();
    console.log('复制成功');
    document.body.removeChild(transfer);
}
		</script>
</body>
</html>
