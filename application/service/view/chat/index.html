    var WEB_SOCKET_SWF_LOCATION = "__libs__/web_socket/WebSocketMain.swf";
    var WEB_SOCKET_DEBUG = true;
    var WEB_SOCKET_SUPPRESS_CROSS_DOMAIN_SWF_ERROR = true;
    var chat_data =Array();
    var record;
    var choose_lock = false;
    var myTitle = document.title;
    var msgreminder = {:config('setting.msgreminder')};

        'app_key':'{$app_key}',
        'whost':'{$whost}',
        'value':{$value},
        'wport':{$wport}
    };
    function titleBlink(){
        record++;

        if(record === 3){
            record =1;
        }

        if(record === 1){
            document.title='【 】'+myTitle;
        }

        if(record === 2){
            document.title='【消息】'+myTitle;
        }

        if(record > 3){
            getwaitnum();
            return;
        }

        setTimeout("titleBlink()",500);//调节时间，单位毫秒。
    }

    layui.use('element', function () {
        var element = layui.element;
    });
    var wolive_connect =function () {
        pusher = new Pusher('{$app_key}', {
            encrypted: {$value}
            , enabledTransports: ['ws']
            , wsHost: '{$whost}'
            , {$port}: {$wport}
    , authEndpoint:  '/admin/login/auth'
            ,disableStats: true
    });

        var web = "{$arr['business_id']}";
        var value ="{$arr['service_id']}";
        // 私人频道
        var channelme = pusher.subscribe("ud" + value);
        channelme.bind("on_notice", function (data) {
            if(data.message.type == 'change'){
                layer.msg(data.message.msg);
            }
            getchat();
            getwait();
        });

        channelme.bind("on_chat", function (data) {
            $.cookie("cu_com",'');
            layer.msg('该访客被删除');
            getchat();
        });

        // 公共平道
        var channelall = pusher.subscribe("all" + web);
        channelall.bind("on_notice", function (data) {
            if({$arr['groupid']} == 0 || {$arr['groupid']} == data.message.groupid){
                layer.msg(data.message.msg, {offset: "20px"});
            }
            if({$arr['groupid']} != data.message.groupid){

                layer.msg('该用户向其他分组咨询！', {offset: "20px"});
            }

            getwait();
            getchat();

        });

        var channel =pusher.subscribe("kefu" + value);
        // 发送一个推送
        channel.bind("callbackpusher",function(data){
            $.post("{:url('admin/set/callback','',true,true)}",data,function(res){
            })
        });

        // 接受视频请求
        channel.bind("video",function (data) {
            getchat();
            var msg = data.message;
            var cha = data.channel;
            var cid = data.cid;
            var avatar =data.avatar;
            var username =data.username;
            layer.open({
                type: 1,
                title: '申请框',
                area: ['260px', '160px'],
                shade: 0.01,
                fixed: true,
                btn: ['接受', '拒绝'],
                content: "<div style='position: absolute;left:20px;top:15px;'><img src='"+avatar+"' width='40px' height='40px' style='border-radius:40px;position:absolute;left:5px;top:5px;'><span style='width:100px;position:absolute;left:70px;top:5px;font-size:13px;overflow-x: hidden;'>"+username+"</span><div style='width:90px;height:20px;position:absolute;left:70px;top:26px;'>"+msg+"</div></div>",
                yes: function () {
                    layer.closeAll('page');
                    var str='';
                    str+='<div class="videos">';
                    str+='<video id="localVideo" autoplay></video>';
                    str+='<video id="remoteVideo" autoplay class="hidden"></video></div>';


                    layer.open({
                        type:1
                        ,title: '视频'
                        ,shade:0
                        ,closeBtn:1
                        ,area: ['440px', '378px']
                        ,content:str
                        ,end:function(){


                            mediaStreamTrack.getTracks().forEach(function (track) {
                                track.stop();
                            });

                        }
                    });
                    try{
                        connenctVide(cid);
                    }catch(e){
                        console.log(e);
                        return;
                    }

                },
                btn2:function(){
                    var sid = $('#channel').text();
                    $.ajax({
                        url:'/admin/set/refuse',
                        type:'post',
                        data:{channel:cha}
                    });

                    layer.closeAll('page');
                }
            });
        });

        channel.bind('bind-wechat',function(data){
            layer.open({
                content: data.message
                ,btn: ['确定']
                ,yes: function(index, layero){
                    location.reload();
                }
                ,cancel: function(){
                    return false;
                }
            });
        });


        channel.bind('getswitch',function(data){
            layer.alert(data.message);
            getchat();
        });

        // 接受拒绝视频请求
        channel.bind("video-refuse",function (data) {
            layer.alert(data.message);
            layer.closeAll('page');
        });
        // 接受消息
        channel.bind("cu-event", function (data) {
            if("{$voice}" == 'open'){
                audioElementHovertree = document.createElement('audio');
                audioElementHovertree.setAttribute('src', "{$voice_address}");
                audioElementHovertree.setAttribute('autoplay', 'autoplay');
            }
            var debug, portrait,showtime;
            var cdata = $.cookie("cu_com");
            if (cdata) {
                var json = $.parseJSON(cdata);
                debug = json.visiter_id;
                portrait = json.avatar;
            } else {
                debug = "";

            }
            if($.cookie("time") == ""){
                time =data.message.timestamp;
                $.cookie("time",time);
                var mydate =new Date(time*1000);
                showtime =mydate.getHours()+":"+mydate.getMinutes();
            }else{
                time =$.cookie("time");
                if((data.message.timestamp - time) >60){
                    var mydate =new Date(data.message.timestamp*1000);
                    showtime =mydate.getHours()+":"+mydate.getMinutes();
                }else{
                    showtime ="";
                }
                $.cookie("time",data.message.timestamp);
            }
            var msg = '';
            msg += '<li class="chatmsg"><div class="showtime">' +showtime+ '</div><div style="position: absolute;left:3px;">';
            msg += '<img class="my-circle  se_pic" src="' + portrait + '" width="50px" height="50px"></div>';
            msg += "<div class='outer-left'><div class='customer'>";

            if(data.message.content.indexOf('<img')>= 0||data.message.content.indexOf('<a')>= 0||!isNaN(data.message.content)||data.message.content.indexOf('<video')>= 0){
                msg += "<pre>" + data.message.content + "</pre>";
            }else{
                if(data.message.content_trans !=''){
                    msg += "<pre>" + data.message.content + "<p class='trans-data'>译文："+data.message.content_trans+"</p></pre>";
                }else{
                    msg += "<pre>" + data.message.content + "<span class='trans' data-cid='"+data.message.cid+"'>翻 译</span></pre>";
                }
            }
            msg += "</div></div>";
            msg += "</li>";
            var str = data.message.content;
            if (data.message.visiter_id == debug) {
                console.log(msg);
                $(".conversation").append(msg);
                getwatch(data.message.visiter_id);
                str.replace(/<img [^>]*src=['"]([^'"]+)[^>]*>/gi, function (match, capture) {
                    var pos = capture.lastIndexOf("/");
                    var value = capture.substring(pos + 1);
                    if (value.indexOf("emo") == 0) {
                        str = data.message.content;
                    } else {
                        str = '[图片]';
                    }
                });
                str = str.replace(/<div><a[^<>]+><i>.+?<\/i>.+?<\/a><\/div>/,'[文件]');
                str = str.replace(/<a[^<>]+>.+?<\/a>/,'[超链接]');
                str =str.replace(/<img src=['"]([^'"]+)[^>]*>/gi,'[图片]');
                $("#msg" + data.message.channel).html(str);
                console.log(data);
                var div = document.getElementById("wrap");
            }
            getnow(data.message);
            // 即时将收到消息的对话移到顶部
            moveToTop(data.message.channel);
            if(div){
                div.scrollTop = div.scrollHeight;
            }
            $("#notices-icon").removeClass('hide');
            notify(data.message.visiter_name || '新访客', {
                body: str,
                icon: data.message.avatar
            }, function(notification) {
                //可直接打开通知notification相关联的tab窗口
                window.focus();
                notification.close();
                console.log('#v'+data.message.channel+' .visit_content');
                $('#v'+data.message.channel+' .visit_content').trigger('click');
            });
        });


        // 通知 游客离线
        channel.bind("logout", function (data) {

            //表示访客离线
            var cdata = $.cookie("cu_com");
            var chas;
            if (cdata) {
                var jsondata = $.parseJSON(cdata);
                chas = jsondata.channel;
            }

            if (chas == data.message.chas) {
                //头像变灰
                $("#v_state").html("<span class='v-state-badge offline'>离线</span>");
            }

            $("#img" + data.message.chas).addClass("icon_gray");
            $("#dot" + data.message.chas).removeClass("online").addClass("offline");
            getchat();

        });

        channel.bind("geton", function (data) {
            //表示访客在线
            var cdata = $.cookie("cu_com");
            var chas;
            if (cdata) {
                var jsondata = $.parseJSON(cdata);
                chas = jsondata.channel;
            }
            if (chas == data.message.chas) {
                //头像变亮
                $("#img" + data.message.chas).removeClass("icon_gray");
                $("#v_state").html("<span class='v-state-badge online'>在线</span>");
            }
            $("#img" + data.message.chas).removeClass("icon_gray");
            $("#dot" + data.message.chas).removeClass("offline").addClass("online");
            getchat();
        });

        pusher.connection.bind('state_change', function(states) {
            if(states.current == 'unavailable' || states.current == "disconnected" || states.current == "failed" ){

                pusher.unsubscribe("kefu" + value);
                pusher.unsubscribe("all" + web);
                pusher.unsubscribe("ud" + value);
                if (typeof pusher.isdisconnect == 'undefined') {
                    pusher.isdisconnect = true;
                    pusher.disconnect();
                    delete pusher;
                    window.setTimeout(function(){
                        wolive_connect();
                    },1000);
                }
                $("#agent_status").removeClass("online").addClass("offline").html("<span class='agent-dot'></span>离线");
            }
        });

        pusher.connection.bind('connected', function() {
            $("#agent_status").removeClass("offline").addClass("online").html("<span class='agent-dot'></span>在线");
        });
    };


    function showpage(obj){
        var value =$(obj).attr("name");
        var key =$(obj).attr("id");
        layer.tips(value, '#'+key,{tips: [4, '#2F4050']});
    }

    wolive_connect();

    // 访客信息区块折叠/展开
    function toggleSection(header) {
        var body = header.nextElementSibling;
        var arrow = header.querySelector('.section-arrow');
        if (body.classList.contains('section-collapsed')) {
            body.classList.remove('section-collapsed');
            body.style.maxHeight = body.scrollHeight + 'px';
            body.style.opacity = '1';
            arrow.style.transform = 'rotate(0deg)';
            setTimeout(function(){ body.style.maxHeight = 'none'; }, 350);
        } else {
            body.style.maxHeight = body.scrollHeight + 'px';
            body.offsetHeight; // force reflow
            body.classList.add('section-collapsed');
            body.style.maxHeight = '0';
            body.style.opacity = '0';
            arrow.style.transform = 'rotate(-90deg)';
        }
    }

         <!--定位弹窗-->
<script type="text/javascript">

        //定位开始
        var lat;
    var lng;
    var map;
    var marker;
    function get_location() {
        $('.musk').show();
        $('.map_box').show();
        
        if(!map) {
            map = L.map('allmap').setView([39.897445, 116.331398], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
            map.on('click', function(e) {
                var clickLat = e.latlng.lat;
                var clickLng = e.latlng.lng;
                if(marker) map.removeLayer(marker);
                marker = L.marker([clickLat, clickLng], {
                    icon: L.icon({iconUrl: '/static/biaozhu.png', iconSize: [25, 35], iconAnchor: [12, 35]})
                }).addTo(map);
                $('#lat').val(clickLat);
                $('#lng').val(clickLng);
            });
        }
        setTimeout(function(){ map.invalidateSize(); }, 300);
        
        // 使用浏览器定位
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(pos) {
                var myLat = pos.coords.latitude;
                var myLng = pos.coords.longitude;
                if(marker) map.removeLayer(marker);
                marker = L.marker([myLat, myLng]).addTo(map);
                map.setView([myLat, myLng], 15);
                $('#lat').val(myLat);
                $('#lng').val(myLng);
            }, function(err) {
                console.log('定位失败: ' + err.message);
            }, {enableHighAccuracy: true});
        }
    }
   
    $("body").on('click', '#sear', function (e) {
        var keyword = document.getElementById('where').value;
        if(!keyword) return;
        // 使用 Nominatim 免费地理搜索
        $.getJSON('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(keyword), function(data) {
            if(data && data.length > 0) {
                var result = data[0];
                var rLat = parseFloat(result.lat);
                var rLng = parseFloat(result.lon);
                if(marker) map.removeLayer(marker);
                marker = L.marker([rLat, rLng]).addTo(map);
                map.setView([rLat, rLng], 15);
                $('#lat').val(rLat);
                $('#lng').val(rLng);
            } else {
                layer.msg('未找到该地址');
            }
        });
    });
    
    $("body").on('click', '#showPosition', function (e) { 
        e.preventDefault();
        $('.musk').hide();
        $('.map_box').hide();
        var lag =$('#lng').val()
        var lat = $('#lat').val()
       showPosition(lat,lag)
    });

		function showPosition(lat,lag){
            layer.msg('定位中..');
            // 使用 Nominatim 免费逆地理编码
            $.getJSON('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lag, function(result) {
                if(result && result.display_name) {
                    var myAddress = result.display_name;
                    var sid = $('#channel').text();
                    var pic = $("#se_avatar").attr('src');
                    var unstr=(new Date()).valueOf()+randomChar(5)+sid;

                    var sdata = $.cookie('cu_com');

                    if (sdata) {
                        var json = $.parseJSON(sdata);
                        var img = json.avater;
                    }
                    
                    var myDate = new Date();
                    var time =  myDate.getHours()+":"+myDate.getMinutes();
                    var locationmessage='<a href="https://www.openstreetmap.org/?mlat='+lat+'&mlon='+lag+'#map=16/'+lat+'/'+lag+'" style="display: block;" target="_blank"><p style="margin-bottom: 10px">'+myAddress+'</p><img src="/upload/map.png"></a>';
                    
                    $.ajax({
                        url:"/admin/set/chats",
                        type: "post",
                        data: {visiter_id:sid,content:  locationmessage, avatar: img,unstr:unstr},
                        dataType:'json',
                        success:function(res){
                            if(res.code != 0){
                                layer.msg(res.msg,{icon:2});
                            } else {
                           
                                var str = '';
                            
                                str += '<li class="chatmsg" id="xiaox_'+ unstr +'"><div class="showtime">' + time + '</div>';
                                str += '<div style="position: absolute;top: 26px;right: 2px;"><img  class="my-circle se_pic" src="' + pic + '" width="50px" height="50px"></div>';
                                str += "<div class='outer-right'><div class='service'>";
                                str += "<pre>" +  locationmessage + "<span onclick=revoke('" + unstr + "',2); class='revoke-text'>撤销</span></pre>";
                                str += "</div></div>";
                                str += "</li>";
                                $(".conversation").append(str);
                                
                                var div = document.getElementById("wrap");
                                div.scrollTop = div.scrollHeight;
                            }
                        }
                    });
                } else {
                    showError("获取定位地址失败");
                }
            }).fail(function() {
                showError("获取定位地址失败");
            });
		}
		function showError(error){
		    layer.msg("定位失败");
		}
		
		//定位结束

       

    function toEvaluate() {
        var data = $.cookie("cu_com");
        var jsondata = $.parseJSON(data);
        $.ajax({
            url: '/admin/set/pushComment',
            type:'post',
            data:{visiter_id:jsondata.visiter_id},
            success:function(res){
                if(res.code == 0){

        document.getElementById('text_in').addEventListener('paste', function (e) {
            // 添加到事件对象中的访问系统剪贴板的接口
            var clipboardData = e.clipboardData,
                i = 0,
                items, item, types;

            if (clipboardData) {
                items = clipboardData.items;
                if (!items) {
                    return;
                }
                item = items[0];
                // 保存在剪贴板中的数据类型
                types = clipboardData.types || [];
                for (; i < types.length; i++) {
                    if (types[i] === 'Files') {
                        item = items[i];
                        break;
                    }
                }
                // 判断是否为图片数据
                if (item && item.kind === 'file' && item.type.match(/^image\//i)) {
                    imgReader(item);
                }
            }
        });
    })();

        //毫秒转换秒
   function getFormatDuration(second){
        if(second>1000){
            let result = parseInt(second/1000);
            let h =  Math.floor(result / 3600) ;
            let m = Math.floor((result / 60 % 60)) ;
            let s = Math.floor((result % 60));
           
            if (h>0) {
                return h+":"+m+":"+s+'"';
            } else if(m>0) {
                return m+"分:"+s+'"';
            }else{
                
                return s+'"';
            }
           
        }else{
            let result = second/1000;
            return result.toFixed(2)+'"';
        }
        
    }

                                    var str = '';

                                    str += '<div style="position: absolute;top: 26px;right: 2px;"><img  class="my-circle se_pic" src="' + pic + '" width="50px" height="50px"></div>';
                                    str += "<div class='outer-right'><div class='service'>";
                                    str += "<pre>" +  voicemessage + "<span onclick=revoke('" + unstr + "',2); class='revoke-text'>撤销</span></pre>";
                                    str += "</div></div>";
                                    str += "</li>";

                                    $(".conversation").append(str);
                                    $("#text_in").empty();

                                    var div = document.getElementById("wrap");
                                    div.scrollTop = div.scrollHeight;

                                        height: 'auto'
                                    });
                                    $.ajax({
                                        url:"/admin/set/chats",

                                    });
                                }
                            };
                            xhr.open('POST', '/admin/event/uploadVoice');

                        });

                        layer.close(index);
                    }
                    , btn2: function (index, layero) {
                        recClose();
                        layer.close(index);
                    }
                });

            });
            console.log("已开始录音...");
        }else{
            layer.msg("发送语音失败")
        }
    }

    var getaudio =function(){

        //音频先加载
        var audio_context;
        var recorder;
        var wavBlob;
        //创建音频
        try {
            // webkit shim
            window.AudioContext = window.AudioContext || window.webkitAudioContext;
            navigator.getUserMedia = navigator.getUserMedia || navigator.webkitGetUserMedia || navigator.mozGetUserMedia || navigator.msGetUserMedia || navigator.mediaDevices.getUserMedia;
            window.URL = window.URL || window.webkitURL;

            audio_context = new AudioContext;

            if (!navigator.getUserMedia) {
                console.log('语音创建失败');
            }
            ;
        } catch (e) {
            console.log(e);
            return;
        }
        navigator.getUserMedia({audio: true}, function (stream) {
            var input = audio_context.createMediaStreamSource(stream);
            recorder = new Recorder(input);

            var falg = window.location.protocol;
            if (falg == 'https:') {
                recorder && recorder.record();

                //示范一个公告层
                layui.use(['jquery', 'layer'], function () {
                    var layer = layui.layer;

                    layer.msg('录音中...', {
                        icon: 16
                        , shade: 0.01
                        , skin: 'layui-layer-lan'
                        , time: 0 //20s后自动关闭
                        , btn: ['发送', '取消']
                        , yes: function (index, layero) {
                            //按钮【按钮一】的回调
                            recorder && recorder.stop();
                            recorder && recorder.exportWAV(function (blob) {
                                wavBlob = blob;
                                var fd = new FormData();
                                var wavName = encodeURIComponent('audio_recording_' + new Date().getTime() + '.wav');
                                fd.append('wavName', wavName);
                                fd.append('file', wavBlob);

                                var xhr = new XMLHttpRequest();
                                xhr.onreadystatechange = function () {
                                    if (xhr.readyState == 4 && xhr.status == 200) {
                                        jsonObject = JSON.parse(xhr.responseText);

                                        voicemessage = '<div style="cursor:pointer;text-align:center;" onclick="getstate(this)" data="play"><audio src="'+jsonObject.data.src+'"></audio><i class="layui-icon" style="font-size:25px;">&#xe652;</i><p>音频消息</p></div>';

                                        var sid = $('#channel').text();
                                        var pic = $("#se_avatar").attr('src');
                                        var time;

                                        var sdata = $.cookie('cu_com');

                                        if (sdata) {
                                            var json = $.parseJSON(sdata);
                                            var img = json.avater;

                                        }

                                        if($.cookie("time") == ""){
                                            var myDate = new Date();
                                            let hours = myDate.getHours();
                                            let minutes = myDate.getMinutes();
                                            if(hours < 10 ) {
                                                minutes = '0'+minutes.toString();
                                            }
                                            if(minutes < 10 ) {
                                                minutes = '0'+minutes.toString();
                                            }
                                            time = hours+":"+minutes;
                                            var timestamp = Date.parse(new Date());
                                            $.cookie("time",timestamp/1000);

                                        }else{

                                            var timestamp = Date.parse(new Date());

                                            var lasttime =$.cookie("time");
                                            if((timestamp/1000 - lasttime) >30){
                                                var myDate =new Date(timestamp*1000);
                                                let hours = myDate.getHours();
                                                let minutes = myDate.getMinutes();
                                                if(hours < 10 ) {
                                                    minutes = '0'+minutes.toString();
                                                }
                                                if(minutes < 10 ) {
                                                    minutes = '0'+minutes.toString();
                                                }
                                                time = hours+":"+minutes;
                                            }else{
                                                time ="";
                                            }

                                            $.cookie("time",timestamp/1000);
                                        }
                                        var str = '';
                                        str += '<li class="chatmsg"><div class="showtime">' + time + '</div>';
                                        str += '<div style="position: absolute;top: 26px;right: 2px;"><img  class="my-circle se_pic" src="' + pic + '" width="50px" height="50px"></div>';
                                        str += "<div class='outer-right'><div class='service'>";
                                        str += "<pre>" +  voicemessage + "</pre>";
                                        str += "</div></div>";
                                        str += "</li>";

                                        $(".conversation").append(str);
                                        $("#text_in").empty();

                                        var div = document.getElementById("wrap");
                                        div.scrollTop = div.scrollHeight;
                                        $(".chatmsg").css({
                                            height: 'auto'
                                        });
                                        $.ajax({
                                            url:"/admin/set/chats",
                                            type: "post",
                                            data: {visiter_id:sid,content:  voicemessage, avatar: img}
                                        });
                                    }
                                };
                                xhr.open('POST', '/admin/event/uploadVoice');
                                xhr.send(fd);
                            });
                            recorder.clear();
                            layer.close(index);
                        }
                        , btn2: function (index, layero) {
                            //按钮【按钮二】的回调
                            recorder && recorder.stop();
                            recorder.clear();
                            audio_context.close();
                            layer.close(index);
                        }
                    });

                });
            } else {

                layer.msg('音频输入只支持https协议！');

            }


        }, function (e) {
            layer.msg(e);
        });


    }

    var getstate =function(obj){

        var c=obj.children[0];

        var state=$(obj).attr('data');

        if(state == 'play'){
            c.play();
            $(obj).attr('data','pause');
            $(obj).find('i').html("&#xe651;");

        }else if(state == 'pause'){
            c.pause();
            $(obj).attr('data','play');
            $(obj).find('i').html("&#xe652;");
        }

        c.addEventListener('ended', function () {
            $(obj).attr('data','play');
            $(obj).find('i').html("&#xe652;");

        }, false);
    }

    var getswitch =function(){

        var sdata = $.cookie("cu_com");
        var jsondata = $.parseJSON(sdata);

        var se = $("#se").text();

        layer.open({

            title: '转接客服列表',
            area: ['400px', '420px'],

            content: '/service/index/service?visiter_id='+sid+'&name='+se
        });
    }

    function chat2top(id,that){
        that=$(that);
        var istop=that.data('istop');
        $.ajax({
            url:'/admin/visiter/chat2top/visiter_id/'+id+'/istop/'+istop,
            dataType:"json",   //返回格式为json
            async:true,//请求是否异步，默认为异步，这也是ajax重要特性
            type:"POST",   //请求方式
            beforeSend:function(){
                //请求前的处理
                index = layer.load(2, {shade: false});
            },
            success:function(res){
                if(res.code){
                    layer.msg(res.msg,{icon:1});
                    that.data('istop',istop?0:1);
                    that.text(istop?'取消置顶':'置顶对话');
                    setclass=istop?that.addClass('layui-btn-normal').removeClass('layui-btn-danger'):that.addClass('layui-btn-danger').removeClass('layui-btn-normal');
                    window.location.reload(true);
                }else{
                    layer.msg(res.msg,{icon:2});
                }
                //请求成功时处理
            },
            complete:function(){
                //请求完成的处理
                layer.close(index);
            },
            error:function(){
                //请求出错处理
            }
        });
    }
