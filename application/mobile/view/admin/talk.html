    <script>
        var config = {
            'app_key': '{$app_key}',
            'web_host': '{$whost}',
            'web_port': '{$wport}',
            'value': '{$value}',
            'business_id': '{$user["business_id"]}',
            'service_id': '{$user["service_id"]}',
            'voice_state': '{$voice}',
            'voice_address': '{$voice_address}'
        };
        var exporturl='/mobile/index/export?visiter_id={$data.visiter_id}&service_id={$user["service_id"]}&business_id={$user["business_id"]}';
        var pic = '{$avatar}';
        var imghead = '{$img}';
        var num = 0;
        //标记已看消息
        function getwatch(cha) {
            $.ajax({
                url:ROOT_URL+"/admin/set/getwatch",
                type: "post",
                data: {visiter_id: cha}
            });
        }

        // new pusher 链接websocket
        var wolive_connect = function () {
            if (config.value == 'true') {
                var pusher = new Pusher(config.app_key, {
                    encrypted: true
                    , enabledTransports: ['wss']
                    , wsHost: config.web_host
                    , wssPort: config.web_port
                    , authEndpoint: '/auth.php'
                    , disableStats: true
                });
            } else {
                var pusher = new Pusher(config.app_key, {
                    encrypted: false
                    , enabledTransports: ['ws']
                    , wsHost: config.web_host
                    , wsPort: config.web_port
                    , authEndpoint: '/auth.php'
                    , disableStats: true
                });
            }

            var value = "{$user['service_id']}";
            var channel = pusher.subscribe("kefu" + value);
            // 发送一个推送
            channel.bind("callbackpusher",function(data){
                $.post("{:url('admin/set/callback','',true,true)}",data,function(res){

                })
            });
//接收消息
            channel.bind("cu-event", function (data) {
                $.ajax({
                    url: ROOT_URL + "/weixin/chat/checkchats",
                    type: "post",
                    data: { visiter_id: data.message.visiter_id, content: "正在输入"}
                });
                if("{$voice}" == 'open'){
                    document.getElementById("chat-message-audio").play();
                }
                var showtime = '';
                if (data.message.visiter_id == "{$data['visiter_id']}") {
                    var msg = '';
                    msg += '<li class="chatmsg"><div class="showtime">' + showtime + '</div><div style="position: absolute;left:12px;">';
                    msg += '<img class="my-circle  se_pic" src="' + pic + '" width="40px" height="40px"></div>';
                    msg += "<div class='outer-left'><div class='customer'>";

                    if(data.message.content.indexOf('<img')>= 0||data.message.content.indexOf('<a')>= 0||!isNaN(data.message.content)||data.message.content.indexOf('<video')>= 0){
                        msg += "<pre>" + data.message.content + "</pre>";
                    }else{
                        msg += "<pre>" + data.message.content + "<span class='trans' data-cid='"+data.message.cid+"'>翻 译</span></pre>";
                    }
                    msg += "</div></div>";
                    msg += "</li>";
                    $('.conversation').append(msg);
                    getwatch(data.message.visiter_id);
                } else {
                    num++;
                    if (num > 0) {
                        $(".newmsg").removeClass('hide');
                    } else {
                        $(".newmsg").addClass('hide');
                    }
                    $(".newmsg").text(num);
                }
                var div = document.getElementById("wrap");
                div.scrollTop = div.scrollHeight;
                
                $("img[src*='upload/images']").parent().parent('.customer').css({
                    padding: '0',borderRadius: '0',maxHeight:'100px'
                });
                $("img[src*='upload/images']").parent().parent('.service').css({
                    padding: '0',borderRadius: '0',maxHeight:'100px'
                });

                setTimeout(function(){
                    $('.chatmsg').css({
                        height: 'auto'
                    });
                },0)
            });

            channel.bind('logout', function () {
                $("#status").text('[离线]');
            });

            channel.bind('geton', function () {
                $("#status").text('');
            });


            pusher.connection.bind('state_change', function (states) {
                // states = {previous: 'oldState', current: 'newState'}
                if (states.current == 'unavailable' || states.current == "disconnected" || states.current == "failed") {

                    pusher.unsubscribe("kefu" + value);
                    pusher.unsubscribe("all" + all);
                    $.cookie("hid", '');
                    wolive_connect();
                }

            });

            pusher.connection.bind('connected', function () {
                $(".chatmsg").remove();
                $.cookie('hid', '');
                getdata();
            });
        }
    </script>

<script >
//定位开始
var lat;
var lng;
var map;
var marker;
function get_location() {
$('.musk').show();
$('.map_box').show();

if(!map) {
    map = L.map('allmap').setView([39.897445, 116.331398], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);
    map.on('click', function(e) {
        var clickLat = e.latlng.lat;
        var clickLng = e.latlng.lng;
        if(marker) map.removeLayer(marker);
        marker = L.marker([clickLat, clickLng], {
            icon: L.icon({iconUrl: '/static/biaozhu.png', iconSize: [25, 35], iconAnchor: [12, 35]})
        }).addTo(map);
        $('#lat').val(clickLat);
        $('#lng').val(clickLng);
    });
}
setTimeout(function(){ map.invalidateSize(); }, 300);

if(navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
        var myLat = pos.coords.latitude;
        var myLng = pos.coords.longitude;
        if(marker) map.removeLayer(marker);
        marker = L.marker([myLat, myLng]).addTo(map);
        map.setView([myLat, myLng], 15);
        $('#lat').val(myLat);
        $('#lng').val(myLng);
    }, function(err) {
        console.log('定位失败: ' + err.message);
    }, {enableHighAccuracy: true});
}
}

$("body").on('click', '#sear', function (e) {

function showPosition(lat,lag){
    layer.msg('定位中..');
    $.getJSON('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lag, function(result) {
        if(result && result.display_name) {
            var myAddress = result.display_name;
            var sid = "{$data.visiter_id}";
            var pic = "{$data.avatar}";
            var unstr=(new Date()).valueOf()+randomChar(5)+sid;

            var sdata = $.cookie('cu_com');
            if (sdata) {
                var json = $.parseJSON(sdata);
                var img = json.avater;
            }
            
            var myDate = new Date();
            var time =  myDate.getHours()+":"+myDate.getMinutes();
            var locationmessage='<a href="https://www.openstreetmap.org/?mlat='+lat+'&mlon='+lag+'#map=16/'+lat+'/'+lag+'" style="display: block;" target="_blank"><p style="margin-bottom: 10px">'+myAddress+'</p><img src="/upload/map.png"></a>';
            
            $.ajax({
                url:"/admin/set/chats",
                type: "post",
                data: {visiter_id:sid,content:  locationmessage, avatar: img,unstr:unstr},
                dataType:'json',
                success:function(res){
                    if(res.code != 0){
                        layer.msg(res.msg,{icon:2});
                    } else {
                        var str = '';
                    
                        str += '<li class="chatmsg" id="xiaox_'+ unstr +'"><div class="showtime">' + time + '</div>';
                        str += '<div style="position: absolute;top: 26px;right: 2px;"><img  class="my-circle se_pic" src="' + pic + '" width="50px" height="50px"></div>';
                        str += "<div class='outer-right'><div class='service'>";
                        str += "<pre>" +  locationmessage + "<span onclick=revoke('" + unstr + "',2); class='revoke-text'>撤销</span></pre>";
                        str += "</div></div>";
                        str += "</li>";
                        $(".conversation").append(str);
                        
                        var div = document.getElementById("wrap");
                        div.scrollTop = div.scrollHeight;
                    }
                }
            });
        } else {
            showError("获取定位地址失败");
        }
    }).fail(function() {
        showError("获取定位地址失败");
    });
}
function showError(error){
    layer.msg("定位失败");
}

        //毫秒转换秒
   function getFormatDuration(second){
        if(second>1000){
            let result = parseInt(second/1000);
            let h =  Math.floor(result / 3600) ;
            let m = Math.floor((result / 60 % 60)) ;
            let s = Math.floor((result % 60));
           
            if (h>0) {
                return h+":"+m+":"+s+'"';
            } else if(m>0) {
                return m+"分:"+s+'"';
            }else{
                
                return s+'"';
            }
           
        }else{
            let result = second/1000;
            return result.toFixed(2)+'"';
        }
        
    }
